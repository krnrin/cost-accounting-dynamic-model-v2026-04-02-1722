<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新建项目 - G281 成本核算</title>
  <link rel="stylesheet" href="../ui/tokens.css">
  <link rel="stylesheet" href="../shared/nav.css">
  <link rel="stylesheet" href="../shared/project_switcher.css">
  <link rel="stylesheet" href="../ui/new_project_wizard.css">
  <link rel="stylesheet" href="../ui/responsive.css">
  <link rel="stylesheet" href="../ui/loading.css">
</head>
<body>
  <script src="../shared/nav.js"></script>
  <script src="../shared/page_router.js"></script>

  <main class="wizard-page">
    <section class="wizard-page__hero">
      <div>
        <p class="wizard-page__eyebrow">Project Setup</p>
        <h1>新建项目</h1>
        <p class="wizard-page__intro">
          用 3 步生成新的项目配置，完成后会先初始化项目专属 IndexedDB，再创建项目、写入本地项目注册表，并切换到预演页。
          默认模板只复用规则和量纲，不带入旧项目的线束清单、车型配置和变更历史。
        </p>
      </div>
      <div class="wizard-page__hero-meta">
        <div class="wizard-page__meta-label">目标页</div>
        <div class="wizard-page__meta-value">preview.html</div>
      </div>
    </section>

    <section class="wizard-page__body">
      <div id="newProjectWizardRoot"></div>
    </section>
  </main>

  <script src="../utils/shared.js"></script>
  <script src="../utils/core.js"></script>
  <script src="../core/config_loader.js"></script>
  <script src="../config/project_registry.js"></script>
  <script src="../engine/bom_db.js"></script>
  <script src="../engine/schema_migrator.js"></script>
  <script src="../shared/project_switcher.js"></script>
  <script src="../shared/app_bootstrap.js"></script>
  <script src="../ui/new_project_wizard.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async function () {
      if (window.G281Bootstrap && typeof window.G281Bootstrap.mountPageChrome === 'function') {
        window.G281Bootstrap.mountPageChrome();
      } else if (window.G281Nav && typeof window.G281Nav.mountNavBar === 'function') {
        window.G281Nav.mountNavBar();
      }

      if (window.G281NewProjectWizard && typeof window.G281NewProjectWizard.init === 'function') {
        await window.G281NewProjectWizard.init({
          mountId: 'newProjectWizardRoot',
          baseConfigPath: '../config/g281.project.json',
          redirectTo: 'pages/preview.html'
        });
      }
    });
  </script>
</body>
</html>
