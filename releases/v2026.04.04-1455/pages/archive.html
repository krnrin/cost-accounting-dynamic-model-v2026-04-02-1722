<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>归档 - 生命周期成本平台</title>
  <link rel="stylesheet" href="../shared/nav.css">
  <link rel="stylesheet" href="../shared/project_switcher.css">
  <link rel="stylesheet" href="../ui/dashboard.css">
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f0f1a; color: #e5e7eb; }
    .page-header { padding: 20px 24px 12px; }
    .page-header h1 { margin: 0; font-size: 22px; font-weight: 700; }
    .page-header p { margin: 4px 0 0; font-size: 13px; color: #9ca3af; }
    .archive-content { padding: 0 24px 24px; }
    .status-bar, .arc-section, .arc-card { margin-top: 16px; background: #151527; border: 1px solid #2a2a3e; border-radius: 12px; }
    .status-bar { padding: 14px 16px; font-size: 13px; color: #d1d5db; }
    .arc-section, .arc-card { padding: 16px; }
    .arc-section h2, .arc-card h3 { margin: 0 0 10px; font-size: 16px; }
    .arc-section p, .arc-card p { margin: 0 0 12px; font-size: 12px; color: #9ca3af; }
    .summary-grid, .arc-grid, .two-col { display: grid; gap: 16px; }
    .summary-grid { grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); }
    .arc-grid, .two-col { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
    .summary-card { padding: 14px; background: #111125; border: 1px solid #27273a; border-radius: 10px; }
    .summary-card strong { display: block; font-size: 12px; color: #9ca3af; }
    .summary-card span { display: block; margin-top: 8px; font-size: 22px; font-weight: 700; }
    .summary-card small { display: block; margin-top: 6px; font-size: 12px; color: #93c5fd; }
    .table-wrap { overflow: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th, td { padding: 8px 10px; border-bottom: 1px solid #27273a; text-align: left; vertical-align: top; }
    th { color: #cbd5e1; font-weight: 600; }
    td { color: #e5e7eb; }
    .chip-list { display: flex; gap: 8px; flex-wrap: wrap; }
    .chip { padding: 6px 10px; border-radius: 999px; background: #111125; border: 1px solid #27273a; font-size: 12px; color: #cbd5e1; }
    .empty { padding: 12px; border-radius: 8px; background: #111125; color: #9ca3af; font-size: 12px; }
  </style>
</head>
<body>
  <div class="page-header">
    <h1>归档</h1>
    <p>管理版本时间线、release 包、审批记录、工作簿快照与导出模板映射，保留离线回溯链路。</p>
  </div>

  <div class="archive-content">
    <div id="arcStatus" class="status-bar">正在初始化归档上下文...</div>

    <section class="arc-section">
      <h2>归档概览</h2>
      <div id="arcSummaryMount" class="summary-grid"></div>
    </section>

    <section class="arc-section">
      <h2>版本时间线</h2>
      <p>优先显示本地版本快照；如存在 release timeline，则同步展示发布链路。</p>
      <div id="arcTimelineMount"></div>
    </section>

    <div class="arc-grid">
      <section class="arc-card" id="releasePackMount"></section>
      <section class="arc-card" id="approvalMount"></section>
      <section class="arc-card" id="snapshotMount"></section>
    </div>

    <section class="arc-section">
      <h2>BOM 与客户模板</h2>
      <div id="arcWorkbookMount" class="two-col"></div>
    </section>
  </div>

  <script src="../shared/nav.js"></script>
  <script src="../shared/page_router.js"></script>
  <script src="../g281_data_bundle.js"></script>
  <script src="../utils/shared.js"></script>
  <script src="../utils/core.js"></script>
  <script src="../engine/shared_utils.js"></script>
  <script src="../engine/state_normalizer.js"></script>
  <script src="../engine/snapshot_resolver.js"></script>
  <script src="../engine/annual_calc.js"></script>
  <script src="../engine/config_bridge.js"></script>
  <script src="../engine/computation_path.js"></script>
  <script src="../engine/compute_model.js"></script>
  <script src="../engine/profit_shapley.js"></script>
  <script src="../engine/bom_parser.js"></script>
  <script src="../engine/bom_schema.js"></script>
  <script src="../engine/bom_db.js"></script>
  <script src="../engine/align_key_enhancer.js"></script>
  <script src="../engine/workflow_stage_board_builder.js"></script>
  <script src="../engine/customer_quote_template_adapter.js"></script>
  <script src="../engine/bom_workbook_adapter.js"></script>
  <script src="../engine/harness_stage_cost_builder.js"></script>
  <script src="../engine/project_rollup_builder.js"></script>
  <script src="../engine/error_boundary.js"></script>
  <script src="../engine/computation_cache.js"></script>
  <script src="../engine/schema_migrator.js"></script>
  <script src="../core/config_loader.js"></script>
  <script src="../core/repo.js"></script>
  <script src="../core/storage_adapter.js"></script>
  <script src="../core/platform_gateways.js"></script>
  <script src="../config/project_registry.js"></script>
  <script src="../shared/project_switcher.js"></script>
  <script>
    (function () {
      'use strict';

      const DEFAULT_TEMPLATE_KEY = 'customer_quote_standard';

      function textOf(value, fallback) {
        const text = String(value == null ? '' : value).trim();
        return text || (fallback == null ? '' : fallback);
      }

      function escapeHtml(value) {
        return textOf(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function safeArray(value) {
        return Array.isArray(value) ? value : [];
      }

      function numberOf(value, fallback) {
        const numeric = Number(value);
        return Number.isFinite(numeric) ? numeric : (fallback == null ? 0 : fallback);
      }

      function looksBroken(text) {
        return /[\uFFFD]/.test(String(text || ''));
      }

      function safeProjectConfig(rawConfig, runtime) {
        const master = runtime && runtime.master ? runtime.master : {};
        const projectCode = textOf(
          rawConfig && (rawConfig.projectCode || rawConfig.projectId),
          textOf(master.projectCode || master.projectId, 'PROJECT')
        );
        const fallbackName = textOf(master.name, projectCode + ' 生命周期成本平台');
        return Object.assign({}, rawConfig || {}, {
          projectCode: projectCode,
          projectId: textOf(rawConfig && rawConfig.projectId, projectCode),
          projectName: looksBroken(rawConfig && rawConfig.projectName)
            ? fallbackName
            : textOf(rawConfig && rawConfig.projectName, fallbackName),
        });
      }

      function ensureProject(projectConfig) {
        const registry = window.G281ProjectRegistry;
        if (!registry || !projectConfig || !projectConfig.projectCode) return;
        try {
          registry.registerProject(projectConfig.projectCode, projectConfig);
        } catch (error) {}
        try {
          if (typeof registry.getActiveCode === 'function' && registry.getActiveCode() !== projectConfig.projectCode) {
            registry.switchProject(projectConfig.projectCode);
          }
        } catch (error) {}
      }

      function mountProjectSwitcher(nav) {
        const host = nav && nav.querySelector('.g281-nav-meta');
        if (!host || !window.G281ProjectSwitcher || !window.G281ProjectSwitcher.render) return;
        const mount = document.createElement('div');
        host.appendChild(mount);
        window.G281ProjectSwitcher.render(mount, { onSwitch: function () { location.reload(); } });
      }

      function releaseCandidates() {
        return location.pathname.includes('/releases/')
          ? ['../../LATEST_RELEASE.json']
          : ['../releases/LATEST_RELEASE.json'];
      }

      async function fetchFirstJson(candidates) {
        for (let index = 0; index < candidates.length; index += 1) {
          try {
            const response = await fetch(candidates[index], { cache: 'no-store' });
            if (!response.ok) continue;
            return await response.json();
          } catch (error) {}
        }
        return null;
      }

      async function loadReleaseInfo() {
        const latest = await fetchFirstJson(releaseCandidates());
        if (!latest || !latest.folderName) {
          return { latest: null, metadata: null };
        }
        const metadataCandidates = location.pathname.includes('/releases/')
          ? ['../../' + latest.folderName + '/' + (latest.metadataFile || 'release_metadata.json'), '../release_metadata.json']
          : ['../releases/' + latest.folderName + '/' + (latest.metadataFile || 'release_metadata.json')];
        return {
          latest: latest,
          metadata: await fetchFirstJson(metadataCandidates),
        };
      }

      function resolveDefaultTemplateKey(config) {
        const explicitKey = textOf(
          config && (config.defaultCustomerTemplateKey || config.defaultCustomerTemplateId || config.defaultQuoteTemplateKey),
          ''
        );
        if (explicitKey) return explicitKey;

        const templates = safeArray(config && config.customerTemplates);
        const exactMatch = templates.find(function (template) {
          return textOf(template && (template.key || template.id), '') === DEFAULT_TEMPLATE_KEY;
        });
        if (exactMatch) return textOf(exactMatch.key || exactMatch.id, DEFAULT_TEMPLATE_KEY);

        const customerTemplate = templates.find(function (template) {
          return textOf(template && template.channel, '') === 'customer';
        });
        return textOf(customerTemplate && (customerTemplate.key || customerTemplate.id), DEFAULT_TEMPLATE_KEY);
      }

      function renderTable(columns, rows, emptyText) {
        if (!rows.length) {
          return '<div class="empty">' + escapeHtml(emptyText) + '</div>';
        }

        return [
          '<div class="table-wrap">',
          '<table>',
          '<thead><tr>',
          columns.map(function (column) {
            return '<th>' + escapeHtml(column.label) + '</th>';
          }).join(''),
          '</tr></thead>',
          '<tbody>',
          rows.map(function (row) {
            return '<tr>' + columns.map(function (column, index) {
              const cell = escapeHtml(textOf(row[column.key], '--'));
              return index === 0 ? '<th>' + cell + '</th>' : '<td>' + cell + '</td>';
            }).join('') + '</tr>';
          }).join(''),
          '</tbody>',
          '</table>',
          '</div>',
        ].join('');
      }

      function renderStatus(config, session, latest) {
        document.getElementById('arcStatus').textContent =
          textOf(config && config.projectName, '生命周期成本平台')
          + ' / 归档视角 '
          + textOf(session && session.roleKey, 'costing')
          + ' / 最新发布 '
          + textOf(latest && latest.versionTag, '未生成 release');
      }

      function renderSummary(repo, latest, metadata) {
        const cards = [
          ['版本快照', safeArray(repo.getHistory()).length, '本地离线快照数量'],
          ['审批记录', safeArray(repo.getApprovals()).length, '含 pending / approved'],
          ['财务基线', safeArray(repo.listFinancialVersions()).length, '报价 / 定点等版本'],
          ['最新发布', textOf(latest && latest.versionTag, '--'), textOf((metadata && metadata.structure) || (latest && latest.structure), '未发布')],
        ];

        document.getElementById('arcSummaryMount').innerHTML = cards.map(function (card) {
          return [
            '<div class="summary-card">',
            '<strong>' + escapeHtml(card[0]) + '</strong>',
            '<span>' + escapeHtml(card[1]) + '</span>',
            '<small>' + escapeHtml(card[2]) + '</small>',
            '</div>',
          ].join('');
        }).join('');
      }

      function renderTimeline(repo, metadata) {
        const history = safeArray(repo.getHistory());
        const releaseEvents = safeArray(metadata && metadata.timelineEvents);
        const rows = history.map(function (item) {
          return {
            type: 'snapshot',
            id: textOf(item && item.id, '--'),
            name: textOf(item && (item.name || item.scenarioName), '未命名快照'),
            time: textOf(item && item.createdAt, '--'),
            note: textOf(item && item.note, '本地快照'),
          };
        }).concat(releaseEvents.map(function (item) {
          return {
            type: 'release',
            id: textOf(item && item.versionTag, '--'),
            name: textOf(item && item.versionTag, 'release'),
            time: textOf(item && item.publishedAt, '--'),
            note: '发布版本',
          };
        }));

        document.getElementById('arcTimelineMount').innerHTML = renderTable([
          { key: 'type', label: '类型' },
          { key: 'id', label: '标识' },
          { key: 'name', label: '名称' },
          { key: 'time', label: '时间' },
          { key: 'note', label: '说明' },
        ], rows, '暂无版本时间线数据。');
      }

      function renderReleasePack(latest, metadata) {
        const mount = document.getElementById('releasePackMount');
        if (!latest) {
          mount.innerHTML = '<h3>Release</h3><div class="empty">尚未检测到 release。</div>';
          return;
        }

        mount.innerHTML = [
          '<h3>Release</h3>',
          '<p>保留历史版本，不覆盖旧 release；这里同时显示目录、结构和离线可用性。</p>',
          '<div class="chip-list">',
          '<span class="chip">版本 ' + escapeHtml(textOf(latest.versionTag, '--')) + '</span>',
          '<span class="chip">目录 ' + escapeHtml(textOf(latest.folderName, '--')) + '</span>',
          '<span class="chip">结构 ' + escapeHtml(textOf(latest.structure, '--')) + '</span>',
          '<span class="chip">离线 ' + escapeHtml(String(Boolean(latest.offlineReady))) + '</span>',
          '</div>',
          '<div class="chip-list">',
          safeArray(metadata && metadata.directories).map(function (directory) {
            return '<span class="chip">' + escapeHtml(directory) + '</span>';
          }).join(''),
          '</div>',
        ].join('');
      }

      function normalizeApprovalRows(records, projectCode) {
        return safeArray(records).map(function (row) {
          return {
            project: textOf(row && (row.projectId || row.projectCode), projectCode),
            harness: textOf(row && (row.harnessId || (row.meta && row.meta.harnessId)), '--'),
            artifact: textOf(row && (row.artifactType || (row.meta && row.meta.artifactType)), 'approval'),
            version: textOf(row && (row.versionKey || row.relatedVersionId || (row.meta && row.meta.versionKey)), '--'),
            status: textOf(row && row.status, '--'),
            publishedAt: textOf(row && (row.approvedAt || row.submittedAt || row.createdAt), '--'),
          };
        });
      }

      function renderApprovals(records, config) {
        const rows = normalizeApprovalRows(records, textOf(config && config.projectCode, '--'));
        document.getElementById('approvalMount').innerHTML = [
          '<h3>Audit</h3>',
          '<p>审批记录统一映射为 project / harness / artifact / version / status / publishedAt，方便离线审计与回看。</p>',
          renderTable([
            { key: 'project', label: 'project' },
            { key: 'harness', label: 'harness' },
            { key: 'artifact', label: 'artifact' },
            { key: 'version', label: 'version' },
            { key: 'status', label: 'status' },
            { key: 'publishedAt', label: 'publishedAt' },
          ], rows, '暂无审批 / audit 记录。'),
        ].join('');
      }

      function renderPublishStates(repo, config) {
        const versions = safeArray(repo.listFinancialVersions());
        const publishStates = safeArray(repo.getArtifactPublishStates({})).map(function (row) {
          return {
            project: textOf(row && row.projectId, textOf(config && config.projectCode, '--')),
            harness: textOf(row && row.harnessId, '--'),
            artifact: textOf(row && row.artifactType, '--'),
            version: textOf(row && row.versionKey, '--'),
            status: textOf(row && row.status, '--'),
            publishedAt: textOf(row && (row.publishedAt || row.updatedAt), '--'),
          };
        });

        document.getElementById('snapshotMount').innerHTML = [
          '<h3>Publish</h3>',
          '<p>这里直接读取 repo.getArtifactPublishStates({})，展示 project / harness / artifact / version 的发布状态。</p>',
          '<div class="chip-list">',
          versions.map(function (row) {
            return '<span class="chip">' + escapeHtml(textOf(row && row.key, '--')) + ' / ' + escapeHtml(textOf(row && row.label, '--')) + '</span>';
          }).join(''),
          '<span class="chip">发布记录 ' + escapeHtml(publishStates.length) + ' 条</span>',
          '</div>',
          renderTable([
            { key: 'project', label: 'project' },
            { key: 'harness', label: 'harness' },
            { key: 'artifact', label: 'artifact' },
            { key: 'version', label: 'version' },
            { key: 'status', label: 'status' },
            { key: 'publishedAt', label: 'publishedAt' },
          ], publishStates, '暂无 publish 状态记录。'),
        ].join('');
      }

      function renderWorkbookMount(runtime, config) {
        const bomAdapter = window.G281BomWorkbookAdapter;
        const templateAdapter = window.G281CustomerQuoteTemplateAdapter;
        const stageBuilder = window.G281HarnessStageCostBuilder;
        const rollupBuilder = window.G281ProjectRollupBuilder;
        const templateKey = resolveDefaultTemplateKey(config);
        const bomSnapshot = bomAdapter && typeof bomAdapter.load === 'function'
          ? bomAdapter.load(runtime, 'quote')
          : {};
        const stageResult = stageBuilder && typeof stageBuilder.build === 'function'
          ? stageBuilder.build(runtime, 'quote')
          : {};
        const projectRollup = rollupBuilder && typeof rollupBuilder.build === 'function'
          ? rollupBuilder.build(safeArray(stageResult && stageResult.rows), runtime, { baselineKey: 'quote' })
          : null;
        const template = templateAdapter && typeof templateAdapter.build === 'function'
          ? templateAdapter.build(runtime, templateKey, 'quote', { projectRollup: projectRollup })
          : { templateKey: templateKey, stageKey: 'quote', fields: [] };

        const bomRows = safeArray(bomSnapshot && bomSnapshot.sections).slice(0, 6).map(function (section) {
          return {
            sheet: textOf(section && section.sheetName, '--'),
            role: textOf(section && section.role, '--'),
            rows: textOf(section && section.rowCount, '--'),
            columns: textOf(section && section.columnCount, '--'),
          };
        });

        const templateRows = safeArray(template && template.fields).map(function (field) {
          return {
            cell: textOf(field && field.cellKey, '--'),
            meaning: textOf(field && field.label, '--'),
            value: field && field.valueKey === 'margin'
              ? (numberOf(field.value, 0) * 100).toFixed(2) + '%'
              : textOf(field && field.value, '--'),
          };
        });

        document.getElementById('arcWorkbookMount').innerHTML = [
          '<section class="arc-card">',
          '<h3>BOM 工作簿快照</h3>',
          '<p>线束页、总成散件、二次物料和变更页都保留在离线包中。</p>',
          renderTable([
            { key: 'sheet', label: 'Sheet' },
            { key: 'role', label: '角色' },
            { key: 'rows', label: '行数' },
            { key: 'columns', label: '列数' },
          ], bomRows, '暂无 BOM 快照。'),
          '</section>',
          '<section class="arc-card">',
          '<h3>客户模板映射</h3>',
          '<p>模板 key 改为配置驱动，优先读取 customerTemplates，未命中时回退到 customer_quote_standard。</p>',
          '<div class="chip-list">',
          '<span class="chip">template ' + escapeHtml(textOf(template && template.templateKey, templateKey)) + '</span>',
          '<span class="chip">stage ' + escapeHtml(textOf(template && template.stageKey, 'quote')) + '</span>',
          '</div>',
          renderTable([
            { key: 'cell', label: '单元格' },
            { key: 'meaning', label: '含义' },
            { key: 'value', label: '值' },
          ], templateRows, '暂无模板映射。'),
          '</section>',
        ].join('');
      }

      async function bootstrap() {
        const runtime = window.G281_RUNTIME || {};
        const repo = window.G281Repo.init(runtime);
        const config = safeProjectConfig(await window.ConfigLoader.loadProjectConfig('../config/g281.project.json'), runtime);
        ensureProject(config);

        const nav = window.G281Nav.mountNavBar(config.projectName);
        mountProjectSwitcher(nav);

        const session = window.AuthGateway && typeof window.AuthGateway.getSession === 'function'
          ? await window.AuthGateway.getSession({ roleKey: 'costing' })
          : { roleKey: 'costing' };
        const approvalBundle = window.ApprovalGateway && typeof window.ApprovalGateway.list === 'function'
          ? await window.ApprovalGateway.list({ repo: repo })
          : { records: repo.getApprovals() };
        const approvals = safeArray(approvalBundle && approvalBundle.records).length
          ? approvalBundle.records
          : repo.getApprovals();
        const releaseInfo = await loadReleaseInfo();

        renderStatus(config, session, releaseInfo.latest);
        renderSummary(repo, releaseInfo.latest, releaseInfo.metadata);
        renderTimeline(repo, releaseInfo.metadata);
        renderReleasePack(releaseInfo.latest, releaseInfo.metadata);
        renderApprovals(approvals, config);
        renderPublishStates(repo, config);
        renderWorkbookMount(runtime, config);
      }

      document.addEventListener('DOMContentLoaded', function () {
        bootstrap().catch(function (error) {
          document.getElementById('arcStatus').textContent =
            '归档页初始化失败: ' + textOf(error && error.message ? error.message : error, 'unknown error');
        });
      });
    })();
  </script>
</body>
</html>
