<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>预演 — 动态利润模型</title>
  <link rel="stylesheet" href="../ui/tokens.css">
  <link rel="stylesheet" href="../shared/nav.css">
  <link rel="stylesheet" href="../shared/project_switcher.css">
  <link rel="stylesheet" href="../ui/dashboard.css">
  <link rel="stylesheet" href="../ui/insights.css">
  <link rel="stylesheet" href="../ui/logic_drawer.css">
  <link rel="stylesheet" href="../ui/responsive.css">
  <link rel="stylesheet" href="../ui/loading.css">
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f1a; color: #e0e0e0; }
    .page-header { padding: 20px 24px 12px; }
    .page-header h1 { margin: 0; font-size: 22px; font-weight: 700; }
    .page-header p { margin: 4px 0 0; font-size: 13px; color: #888; }
    .preview-content { padding: 0 24px 24px; }
    #previewKpiGrid, #previewStatePanel, #previewAnnualTable, #previewCharts { margin-top: 16px; }
    .preview-charts-row { display: flex; gap: 16px; flex-wrap: wrap; }
    .preview-charts-row canvas { flex: 1; min-width: 300px; max-height: 320px; background: #1a1a2e; border-radius: 8px; padding: 12px; }
    .status-msg { padding: 12px 16px; border-radius: 8px; font-size: 13px; }
    .status-ok { background: rgba(74,222,128,0.1); color: #4ade80; }
    .status-warn { background: rgba(251,191,36,0.1); color: #fbbf24; }
    .status-err { background: rgba(248,113,113,0.1); color: #f87171; }
  </style>
</head>
<body>
  <!-- 共享导航 -->
  <script src="../shared/nav.js"></script>
  <script src="../shared/page_router.js"></script>

  <div class="page-header">
    <h1>🎯 预演</h1>
    <p>调参模拟 · 查看利润影响 · 快速方案对比</p>
  </div>

  <div class="preview-content">
    <div id="previewStatus"></div>
    <div id="previewKpiGrid"></div>
    <div id="previewStatePanel"></div>
    <div id="previewAnnualTable"></div>
    <div id="previewCharts" class="preview-charts-row">
      <canvas id="chartCostBridge"></canvas>
      <canvas id="chartAnnualTrend"></canvas>
    </div>
    <div id="previewCompare"></div>
  </div>

  <!-- 统一工具函数 (必须最先加载) -->
  <script src="../utils/shared.js"></script>
  <script src="../utils/core.js"></script>
  <script src="../ui/utils/format.js"></script>
  <script src="../ui/utils/dom.js"></script>

  <!-- Engine 子模块 -->
  <script src="../engine/shared_utils.js"></script>
  <script src="../engine/state_normalizer.js"></script>
  <script src="../engine/snapshot_resolver.js"></script>
  <script src="../engine/annual_calc.js"></script>
  <script src="../engine/config_bridge.js"></script>
  <script src="../engine/computation_path.js"></script>
  <script src="../engine/profit_shapley.js"></script>
  <script src="../engine/progress_price_tracker.js"></script>
  <script src="../engine/residual_pool_handler.js"></script>

  <!-- 性能与健壮性 (Issue #12) — 必须在 compute_model 之前加载 -->
  <script src="../engine/error_boundary.js"></script>
  <script src="../engine/computation_cache.js"></script>

  <script src="../engine/compute_model.js"></script>
  <script src="../engine/harness_profit.js"></script>
  <script src="../engine/target_price_solver.js"></script>

  <!-- Core -->
  <script src="../core/config_loader.js"></script>
  <script src="../core/repo.js"></script>
  <script src="../core/storage_adapter.js"></script>

  <!-- 多项目 (Issue #14) -->
  <script src="../config/project_registry.js"></script>
  <script src="../shared/project_switcher.js"></script>
  <script src="../shared/app_bootstrap.js"></script>

  <!-- UI (预演页渲染器) -->
  <script src="../ui/renderers/kpi_grid.js"></script>
  <script src="../ui/renderers/annual_table.js"></script>
  <script src="../ui/renderers/charts.js"></script>
  <script src="../ui/renderers/compare_panel.js"></script>
  <script src="../ui/state/scenario_state.js"></script>
  <script src="../ui/insights.js"></script>
  <script src="../ui/logic_drawer.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const pageBoot = window.G281Bootstrap && typeof window.G281Bootstrap.bootstrapPage === 'function'
        ? await window.G281Bootstrap.bootstrapPage({
            statusElement: 'previewStatus',
            initIdb: false,
            runSchema: false,
            failureHtml: '<div class="status-msg status-warn">未找到可恢复项目，请先新建项目或切换已注册项目。</div>',
          })
        : {
            boot: { project: false },
            statusElement: document.getElementById('previewStatus'),
            repo: typeof G281Repo !== 'undefined' ? G281Repo : null,
          };
      const statusEl = pageBoot.statusElement;
      if (!pageBoot.boot || !pageBoot.boot.project) {
        return;
      }

      let model = null;
      try {
        const repo = typeof G281Repo !== 'undefined' ? G281Repo : null;
        if (repo) {
          const states = (typeof G281UI !== 'undefined' && G281UI.ScenarioState && typeof G281UI.ScenarioState.getState === 'function')
            ? (G281UI.ScenarioState.getState() || {})
            : (typeof G281StateNormalizer !== 'undefined'
              ? G281StateNormalizer.normalize({})
              : {});
          if (typeof G281ComputeModel !== 'undefined') {
            model = G281ComputeModel.compute(repo, states);
          }
        }
      } catch (e) {
        console.error('[预演] 计算失败:', e);
        if (statusEl) statusEl.innerHTML = '<div class="status-msg status-err">⚠ 计算引擎出错: ' + e.message + '</div>';
      }

      if (model && typeof G281UI !== 'undefined' && G281UI.KpiGrid) {
        G281UI.KpiGrid.render(document.getElementById('previewKpiGrid'), model);
      }

      if (typeof G281UI !== 'undefined' && G281UI.ScenarioState && typeof G281UI.ScenarioState.renderStatePanel === 'function') {
        G281UI.ScenarioState.renderStatePanel(document.getElementById('previewStatePanel'));
      }

      if (model && typeof G281UI !== 'undefined' && G281UI.AnnualTable) {
        const annualRows = model.annualRows || model.annual || [];
        G281UI.AnnualTable.render(document.getElementById('previewAnnualTable'), annualRows);
      }

      if (model && typeof G281UI !== 'undefined' && G281UI.Charts) {
        G281UI.Charts.renderCostBridge(document.getElementById('chartCostBridge'), model);
        G281UI.Charts.renderAnnualTrend(
          document.getElementById('chartAnnualTrend'),
          model.annualRows || model.annual || []
        );
      }

      if (model && statusEl && !statusEl.innerHTML) {
        statusEl.innerHTML = '<div class="status-msg status-ok">✓ 模型已加载 · 调整左侧参数面板查看利润变化</div>';
      } else if (!model && statusEl && !statusEl.innerHTML) {
        statusEl.innerHTML = '<div class="status-msg status-warn">💡 暂无数据 · 请先在核算页导入 BOM 和报价数据</div>';
      }
    });
  </script>
</body>
</html>
