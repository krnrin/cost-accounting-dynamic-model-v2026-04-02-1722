<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>预演 — 动态利润模型</title>
  <link rel="stylesheet" href="../shared/nav.css">
  <link rel="stylesheet" href="../ui/dashboard.css">
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f1a; color: #e0e0e0; }
    .page-header { padding: 20px 24px 12px; }
    .page-header h1 { margin: 0; font-size: 22px; font-weight: 700; }
    .page-header p { margin: 4px 0 0; font-size: 13px; color: #888; }
    .preview-content { padding: 0 24px 24px; }
    /* 预演页专属：KPI + 状态控制 + 年度表 + 图表 */
    #previewKpiGrid, #previewStatePanel, #previewAnnualTable, #previewCharts { margin-top: 16px; }
  </style>
</head>
<body>
  <!-- 共享导航 -->
  <script src="../shared/nav.js"></script>
  <script src="../shared/nav.css"></script>
  <script src="../shared/page_router.js"></script>

  <div class="page-header">
    <h1>🎯 预演</h1>
    <p>调参模拟 · 查看利润影响 · 快速方案对比</p>
  </div>

  <div class="preview-content">
    <!-- KPI 指标网格 -->
    <div id="previewKpiGrid"></div>

    <!-- 状态组合控制面板 -->
    <div id="previewStatePanel"></div>

    <!-- 年度利润表 -->
    <div id="previewAnnualTable"></div>

    <!-- 图表区：因果链瀑布图 + Shapley 归因 + 成本桥 -->
    <div id="previewCharts"></div>

    <!-- 对比行 -->
    <div id="previewCompare"></div>
  </div>

  <!-- Engine 子模块 -->
  <script src="../engine/shared_utils.js"></script>
  <script src="../engine/state_normalizer.js"></script>
  <script src="../engine/snapshot_resolver.js"></script>
  <script src="../engine/annual_calc.js"></script>
  <script src="../engine/config_bridge.js"></script>
  <script src="../engine/computation_path.js"></script>
  <script src="../engine/profit_shapley.js"></script>
  <script src="../engine/progress_price_tracker.js"></script>
  <script src="../engine/residual_pool_handler.js"></script>
  <script src="../engine/compute_model.js"></script>
  <script src="../engine/harness_profit.js"></script>
  <script src="../engine/target_price_solver.js"></script>

  <!-- Core -->
  <script src="../core/config_loader.js"></script>
  <script src="../core/repo.js"></script>
  <script src="../core/storage_adapter.js"></script>

  <!-- UI (预演页只加载需要的渲染器) -->
  <script src="../ui/insights.js"></script>
  <script src="../ui/logic_drawer.js"></script>

  <script>
    // 预演页初始化
    document.addEventListener('DOMContentLoaded', () => {
      G281Nav.mountNavBar();
      // TODO: 从 dashboard.js 提取预演相关渲染器后，在此初始化
      console.log('[预演页] 骨架已加载，等待 dashboard.js 拆分后集成渲染器');
    });
  </script>
</body>
</html>
