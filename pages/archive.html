<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>归档 — 数据存档管理</title>
  <link rel="stylesheet" href="../ui/tokens.css">
  <link rel="stylesheet" href="../shared/nav.css">
  <link rel="stylesheet" href="../shared/project_switcher.css">
  <link rel="stylesheet" href="../ui/dashboard.css">
  <link rel="stylesheet" href="../ui/version_timeline.css">
  <link rel="stylesheet" href="../ui/workbook_viewer.css">
  <link rel="stylesheet" href="../ui/responsive.css">
  <link rel="stylesheet" href="../ui/loading.css">
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f1a; color: #e0e0e0; }
    .page-header { padding: 20px 24px 12px; }
    .page-header h1 { margin: 0; font-size: 22px; font-weight: 700; }
    .page-header p { margin: 4px 0 0; font-size: 13px; color: #888; }
    .archive-content { padding: 0 24px 24px; }
    .arc-section { margin-top: 16px; background: #1a1a2e; border-radius: 8px; padding: 16px; }
    .arc-section h2 { margin: 0 0 12px; font-size: 16px; font-weight: 600; }
    .status-msg { padding: 12px 16px; border-radius: 8px; font-size: 13px; }
    .status-ok { background: rgba(74,222,128,0.1); color: #4ade80; }
    .status-warn { background: rgba(251,191,36,0.1); color: #fbbf24; }
  </style>
</head>
<body>
  <script src="../shared/nav.js"></script>
  <script src="../shared/page_router.js"></script>

  <div class="page-header">
    <h1>🗄️ 归档</h1>
    <p>数据存档 · 版本时间线 · Excel 工作簿查看</p>
  </div>

  <div class="archive-content">
    <div id="arcStatus"></div>
    <div class="arc-section" id="arcTimeline">
      <h2>版本时间线</h2>
      <div id="arcTimelineMount"></div>
    </div>
    <div class="arc-section" id="arcWorkbook">
      <h2>Excel 工作簿</h2>
      <div id="arcWorkbookMount"><p style="color:#666; font-size:13px;">原始 Excel Sheet 浏览 · 数据验证 · 导出</p></div>
    </div>
    <div class="arc-section" id="arcRepo">
      <h2>数据仓库</h2>
      <div id="arcRepoInfo"><p style="color:#666; font-size:13px;">GitHub 仓库文件结构 · JSON 数据浏览 · 原始数据下载</p></div>
    </div>
    <div class="arc-section" id="arcBomCompare">
      <h2>BOM 版本对比</h2>
      <div id="arcBomCompareMount"><p style="color:#666; font-size:13px;">冻结版 vs 定点版 · 按线束/分组/料号对比</p></div>
    </div>
  </div>

  <!-- 统一工具函数 -->
  <script src="../utils/shared.js"></script>
  <script src="../utils/core.js"></script>
  <script src="../ui/utils/format.js"></script>
  <script src="../ui/utils/dom.js"></script>

  <!-- Engine (归档页只需轻量引擎) -->
  <script src="../engine/shared_utils.js"></script>
  <script src="../engine/bom_parser.js"></script>
  <script src="../engine/bom_schema.js"></script>
  <script src="../engine/bom_db.js"></script>
  <script src="../engine/align_key_enhancer.js"></script>

  <!-- Schema 迁移 (Issue #11) -->
  <script src="../engine/schema_migrator.js"></script>

  <!-- 性能与健壮性 (Issue #12) -->
  <script src="../engine/error_boundary.js"></script>

  <!-- Core -->
  <script src="../core/config_loader.js"></script>
  <script src="../core/repo.js"></script>
  <script src="../core/storage_adapter.js"></script>

  <!-- 多项目 (Issue #14) -->
  <script src="../config/project_registry.js"></script>
  <script src="../shared/project_switcher.js"></script>
  <script src="../shared/app_bootstrap.js"></script>

  <!-- UI (归档页专属) -->
  <script src="../ui/workbook_viewer.js"></script>
  <script src="../ui/version_timeline.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const pageBoot = window.G281Bootstrap && typeof window.G281Bootstrap.bootstrapPage === 'function'
        ? await window.G281Bootstrap.bootstrapPage({
            statusElement: 'arcStatus',
            initIdb: true,
            runSchema: true,
            failureHtml: '<div class="status-msg status-warn">未找到可恢复项目，请先新建项目或切换已注册项目。</div>',
          })
        : {
            boot: { project: false },
            statusElement: document.getElementById('arcStatus'),
            repo: typeof G281Repo !== 'undefined' ? G281Repo : null,
          };
      const statusEl = pageBoot.statusElement;
      if (!pageBoot.boot || !pageBoot.boot.project) {
        return;
      }

      if (typeof G281VersionTimeline !== 'undefined') {
        const timelineMount = document.getElementById('arcTimelineMount');
        if (timelineMount) {
          try {
            const repo = typeof G281Repo !== 'undefined' ? G281Repo : null;
            let events = [];
            if (repo && repo.getVersionHistory) {
              events = repo.getVersionHistory();
            } else if (repo && repo.data && repo.data.financial_versions) {
              events = Object.entries(repo.data.financial_versions).map(([key, ver]) => ({
                id: key,
                name: ver.label || key,
                group: ver.factor || '报价',
                createdAt: ver.publishAt || ver.created,
                updatedAt: ver.updateAt || ver.updated,
              }));
            }
            G281VersionTimeline.renderTimeline(timelineMount, events, {
              title: '成本要素版本时间线',
              subtitle: '显示各成本要素版本的发布时间与更新时间',
            });
          } catch (e) {
            console.warn('[版本时间线]', e);
            timelineMount.innerHTML = '<p style="color:#666">暂无版本事件数据</p>';
          }
        }
      }

      if (typeof G281WorkbookViewer !== 'undefined') {
        const wbMount = document.getElementById('arcWorkbookMount');
        if (wbMount && G281WorkbookViewer.init) {
          try {
            G281WorkbookViewer.init(wbMount);
          } catch (e) { console.warn('[工作簿查看器]', e); }
        }
      }

      const repoInfoEl = document.getElementById('arcRepoInfo');
      if (repoInfoEl) {
        const repo = typeof G281Repo !== 'undefined' ? G281Repo : null;
        if (repo && repo.data) {
          const dataKeys = Object.keys(repo.data);
          repoInfoEl.innerHTML = `<p style="color:#4ade80;">✓ 已加载 ${dataKeys.length} 个数据集</p>` +
            '<ul style="color:#888;font-size:13px;margin:8px 0 0;padding-left:20px;">' +
            dataKeys.map(k => `<li>${k}</li>`).join('') + '</ul>';
        }
      }

      if (statusEl && !statusEl.innerHTML) {
        statusEl.innerHTML = '<div class="status-msg status-ok">✓ 归档模块已初始化</div>';
      }
    });
  </script>
</body>
</html>
