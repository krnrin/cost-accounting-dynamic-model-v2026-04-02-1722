<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>核算 — 报价工作台</title>
  <link rel="stylesheet" href="../shared/nav.css">
  <link rel="stylesheet" href="../shared/project_switcher.css">
  <link rel="stylesheet" href="../ui/dashboard.css">
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f1a; color: #e0e0e0; }
    .page-header { padding: 20px 24px 12px; }
    .page-header h1 { margin: 0; font-size: 22px; font-weight: 700; }
    .page-header p { margin: 4px 0 0; font-size: 13px; color: #888; }
    .accounting-content { padding: 0 24px 24px; }
    .acc-section { margin-top: 16px; background: #1a1a2e; border-radius: 8px; padding: 16px; }
    .acc-section h2 { margin: 0 0 12px; font-size: 16px; font-weight: 600; }
    .acc-actions { display: flex; gap: 8px; margin-bottom: 12px; }
    .acc-btn { padding: 6px 14px; border-radius: 6px; border: 1px solid #333; background: #252540; color: #e0e0e0; cursor: pointer; font-size: 13px; }
    .acc-btn:hover { background: #333355; }
    .acc-btn-primary { background: #4f46e5; border-color: #4f46e5; }
    .acc-btn-primary:hover { background: #4338ca; }
    .status-msg { padding: 12px 16px; border-radius: 8px; font-size: 13px; }
    .status-ok { background: rgba(74,222,128,0.1); color: #4ade80; }
    .status-warn { background: rgba(251,191,36,0.1); color: #fbbf24; }
  </style>
</head>
<body>
  <script src="../shared/nav.js"></script>
  <script src="../shared/page_router.js"></script>

  <div class="page-header">
    <h1>📊 核算</h1>
    <p>内部核算报价 · 变更报价 · BOM 成本拆解</p>
  </div>

  <div class="accounting-content">
    <div id="accStatus"></div>
    <div class="acc-section" id="accVersionSelector">
      <h2>报价版本</h2>
      <div class="acc-actions">
        <button class="acc-btn acc-btn-primary" id="btnLoadBom">导入 BOM</button>
        <button class="acc-btn" id="btnLoadQuote">导入报价</button>
      </div>
      <div id="accVersionList"><p style="color:#666; font-size:13px;">选择 BOM 版本 → 自动加载对应材料/工时/设备快照</p></div>
    </div>
    <div class="acc-section" id="accCostBreakdown">
      <h2>成本拆解</h2>
      <div id="accCostTable"><p style="color:#666; font-size:13px;">导入数据后自动计算：材料 · 人工 · 制造 · 包装 · 设备 · R&D</p></div>
    </div>
    <div class="acc-section" id="accHarnessProfit">
      <h2>线束级利润</h2>
      <div id="accHarnessTable"><p style="color:#666; font-size:13px;">按线束号拆解收入/成本/利润</p></div>
    </div>
    <div class="acc-section" id="accChangeQuote">
      <h2>变更报价</h2>
      <div id="accChangeTable"><p style="color:#666; font-size:13px;">BOM 变更影响 · 替换/新增/取消 · 呆滞料</p></div>
    </div>
    <div class="acc-section" id="accTargetPrice">
      <h2>目标价求解</h2>
      <div id="accTargetResult"><p style="color:#666; font-size:13px;">二分法反算 ASP → 满足目标利润率</p></div>
    </div>
  </div>

  <!-- 统一工具函数 -->
  <script src="../utils/shared.js"></script>
  <script src="../utils/core.js"></script>

  <!-- Engine -->
  <script src="../engine/shared_utils.js"></script>
  <script src="../engine/state_normalizer.js"></script>
  <script src="../engine/snapshot_resolver.js"></script>
  <script src="../engine/annual_calc.js"></script>
  <script src="../engine/config_bridge.js"></script>
  <script src="../engine/computation_path.js"></script>
  <script src="../engine/profit_shapley.js"></script>
  <script src="../engine/compute_model.js"></script>
  <script src="../engine/harness_profit.js"></script>
  <script src="../engine/target_price_solver.js"></script>
  <script src="../engine/bom_parser.js"></script>
  <script src="../engine/bom_schema.js"></script>
  <script src="../engine/bom_db.js"></script>
  <script src="../engine/align_key_enhancer.js"></script>

  <!-- 性能与健壮性 (Issue #12) -->
  <script src="../engine/error_boundary.js"></script>
  <script src="../engine/computation_cache.js"></script>

  <!-- Schema 迁移 (Issue #11) -->
  <script src="../engine/schema_migrator.js"></script>

  <!-- Core -->
  <script src="../core/config_loader.js"></script>
  <script src="../core/repo.js"></script>
  <script src="../core/storage_adapter.js"></script>

  <!-- 多项目 (Issue #14) -->
  <script src="../config/project_registry.js"></script>
  <script src="../shared/project_switcher.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      G281Nav.mountNavBar();
      const statusEl = document.getElementById('accStatus');

      // ── 1. 项目注册 + IDB 初始化 + Schema 迁移 ──
      try {
        const resp = await fetch('../config/g281.project.json');
        const config = await resp.json();
        if (typeof G281ProjectRegistry !== 'undefined') {
          G281ProjectRegistry.registerProject('G281', config);
          G281ProjectRegistry.switchProject('G281');
          G281ProjectRegistry.lockProject('G281');
        }
      } catch (e) { console.warn('[项目注册]', e); }

      if (typeof G281BomDb !== 'undefined') {
        try {
          await G281BomDb.init();
          if (typeof G281SchemaMigrator !== 'undefined') {
            await G281SchemaMigrator.runPending(G281BomDb);
          }
        } catch (e) { console.warn('[Schema迁移]', e); }
      }

      // ── 2. 版本选择器 ──
      const repo = typeof G281Repo !== 'undefined' ? G281Repo : null;
      if (repo && repo.listVersions) {
        try {
          const versions = repo.listVersions();
          const listEl = document.getElementById('accVersionList');
          if (versions.length && listEl) {
            listEl.innerHTML = versions.map(v =>
              `<button class="acc-btn" data-version="${v.id}">${v.label || v.id}</button>`
            ).join(' ');
          }
        } catch (e) { console.warn('[版本列表]', e); }
      }

      // ── 3. BOM 导入按钮 ──
      const btnLoadBom = document.getElementById('btnLoadBom');
      if (btnLoadBom) {
        btnLoadBom.addEventListener('click', () => {
          // TODO: 从 dashboard.js 提取 BOM 导入逻辑 (Issue #30)
          alert('BOM 导入功能待从 dashboard.js 拆分后接入 (Issue #30)');
        });
      }

      // ── 4. 计算 & 渲染成本拆解 ──
      if (repo && typeof G281ComputeModel !== 'undefined') {
        try {
          const states = typeof G281StateNormalizer !== 'undefined'
            ? G281StateNormalizer.normalize({})
            : {};
          const model = G281ComputeModel.compute(repo, states);
          if (model) {
            // 成本拆解表格 (简化版，完整版待 Issue #30 dashboard.js 拆分)
            const costEl = document.getElementById('accCostTable');
            if (costEl && model.costBreakdown) {
              const items = model.costBreakdown;
              costEl.innerHTML = '<table class="annual-table"><thead><tr>' +
                '<th>成本项</th><th>金额 (元)</th><th>占比</th></tr></thead><tbody>' +
                Object.entries(items).map(([k, v]) => {
                  const pct = model.operating ? ((v / model.operating) * 100).toFixed(1) : '--';
                  return `<tr><td>${k}</td><td>${Number.isFinite(v) ? v.toFixed(2) : '--'}</td><td>${pct}%</td></tr>`;
                }).join('') + '</tbody></table>';
            }

            // ── 线束级利润 (Issue #35: API名修复) ──
            if (typeof G281HarnessProfit !== 'undefined' && G281HarnessProfit.buildHarnessProfitBreakdown) {
              try {
                const runtime = {
                  harnessDrafts: repo.getHarnessDrafts ? repo.getHarnessDrafts() : [],
                  wireLineCatalog: repo.getWireLineCatalog ? repo.getWireLineCatalog() : [],
                };
                const harnessResult = G281HarnessProfit.buildHarnessProfitBreakdown(runtime, model);
                const harnessEl = document.getElementById('accHarnessTable');
                if (harnessEl && harnessResult && harnessResult.harnesses && harnessResult.harnesses.length) {
                  harnessEl.innerHTML = '<table class="annual-table"><thead><tr>' +
                    '<th>线束号</th><th>收入</th><th>成本</th><th>利润</th><th>利润率</th></tr></thead><tbody>' +
                    harnessResult.harnesses.map(r =>
                      `<tr><td>${r.harnessId}</td><td>${r.revenue?.toFixed(2) || '--'}</td>` +
                      `<td>${r.totalCost?.toFixed(2) || '--'}</td><td style="color:${r.profit > 0 ? '#4ade80' : '#f87171'}">${r.profit?.toFixed(2) || '--'}</td>` +
                      `<td>${r.profitMargin ? (r.profitMargin * 100).toFixed(1) + '%' : '--'}</td></tr>`
                    ).join('') + '</tbody></table>';
                }
              } catch (e) { console.warn('[线束利润]', e); }
            }

            // 目标价求解
            if (typeof G281TargetPriceSolver !== 'undefined') {
              const targetEl = document.getElementById('accTargetResult');
              if (targetEl) {
                targetEl.innerHTML = '<p style="color:#888; font-size:13px;">点击下方按钮运行二分法求解</p>' +
                  '<button class="acc-btn acc-btn-primary" id="btnSolveTarget">求解目标价</button>' +
                  '<div id="targetOutput" style="margin-top:12px;"></div>';
                document.getElementById('btnSolveTarget')?.addEventListener('click', () => {
                  try {
                    const result = G281TargetPriceSolver.solve(repo, states, { targetMargin: 0.05 });
                    document.getElementById('targetOutput').innerHTML = result
                      ? `<p style="color:#4ade80;">✓ 目标 ASP: <strong>${result.asp?.toFixed(2)}</strong> 元 (利润率 ${(result.margin * 100).toFixed(1)}%)</p>`
                      : '<p style="color:#f87171;">✗ 求解失败</p>';
                  } catch (e) {
                    document.getElementById('targetOutput').innerHTML = `<p style="color:#f87171;">✗ ${e.message}</p>`;
                  }
                });
              }
            }

            statusEl.innerHTML = '<div class="status-msg status-ok">✓ 数据已加载 · 成本拆解已渲染</div>';
          }
        } catch (e) {
          console.error('[核算] 计算失败:', e);
          statusEl.innerHTML = '<div class="status-msg status-warn">💡 暂无足够数据进行核算 · 请先导入 BOM</div>';
        }
      } else {
        statusEl.innerHTML = '<div class="status-msg status-warn">💡 暂无数据 · 请导入 BOM 和报价数据</div>';
      }

      console.log('[核算页] 渲染器已接入');
    });
  </script>
</body>
</html>
