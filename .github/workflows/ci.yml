name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  app-quality:
    name: App Lint + Test + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm run test:run

      - name: Production build
        run: npm run build

  server-quality:
    name: Server Build + Health Script
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build server
        run: npm run build

      - name: Initialize database
        env:
          JWT_SECRET: ci-local-secret
          CORS_ORIGIN: http://localhost:5173
        run: npm run db:init

  smoke-e2e:
    name: Smoke E2E
    runs-on: ubuntu-latest
    needs: [app-quality, server-quality]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            app/package-lock.json
            server/package-lock.json

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Build server
        working-directory: server
        run: npm run build

      - name: Install Playwright browser
        working-directory: app
        run: npx playwright install --with-deps chromium

      - name: Start backend
        working-directory: server
        env:
          JWT_SECRET: ci-local-secret
          CORS_ORIGIN: http://localhost:5173
        run: nohup npm start > ../server.log 2>&1 &

      - name: Wait for backend health
        working-directory: server
        env:
          HEALTHCHECK_URL: http://127.0.0.1:3001/health
        run: |
          for i in {1..30}; do
            if npm run healthcheck; then
              exit 0
            fi
            sleep 2
          done
          cat ../server.log
          exit 1

      - name: Run smoke suite
        working-directory: app
        env:
          CI: true
        run: npx playwright test e2e/smoke.spec.ts
